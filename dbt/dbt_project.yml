name: 'streamguard'
version: '1.0.0'
config-version: 2

profile: 'streamguard'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  streamguard:
    staging:
      +materialized: incremental
      +schema: STAGING
    marts:
      +materialized: table
      +schema: MARTS

vars:
  streamguard_database: STREAMGUARD_DB
  raw_schema: RAW
  metrics_schema: METRICS
  alerts_schema: ALERTS
